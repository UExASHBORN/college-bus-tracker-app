<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In — College Bus Tracker</title>
  <meta name="description" content="Sign in to access the College Bus live tracking system."/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', 'Segoe UI', sans-serif;
      background: #0f172a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* ── Animated background blobs ── */
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.12;
      pointer-events: none;
    }
    .blob-1 {
      width: 480px; height: 480px;
      background: #3b82f6;
      top: -140px; left: -140px;
      animation: drift1 10s ease-in-out infinite;
    }
    .blob-2 {
      width: 360px; height: 360px;
      background: #6366f1;
      bottom: -100px; right: -100px;
      animation: drift2 12s ease-in-out infinite;
    }
    .blob-3 {
      width: 280px; height: 280px;
      background: #22d3ee;
      top: 55%; left: 58%;
      animation: drift1 9s ease-in-out infinite reverse;
    }
    @keyframes drift1 {
      0%, 100% { transform: translate(0, 0); }
      50%       { transform: translate(30px, -25px); }
    }
    @keyframes drift2 {
      0%, 100% { transform: translate(0, 0); }
      50%       { transform: translate(-25px, 20px); }
    }

    /* ── Subtle grid pattern ── */
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
    }

    /* ── Login card ── */
    .login-card {
      background: rgba(30, 41, 59, 0.75);
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      border: 1px solid rgba(255, 255, 255, 0.07);
      border-radius: 28px;
      padding: 48px 42px;
      width: 100%;
      max-width: 430px;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.55), 0 0 0 1px rgba(255,255,255,0.04);
      position: relative;
      z-index: 10;
      animation: card-in 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }
    @keyframes card-in {
      from { opacity: 0; transform: translateY(20px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ── Card header ── */
    .card-header {
      text-align: center;
      margin-bottom: 38px;
    }
    .bus-icon {
      width: 68px; height: 68px;
      background: linear-gradient(135deg, #3b82f6 0%, #6366f1 100%);
      border-radius: 20px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      margin-bottom: 18px;
      box-shadow: 0 8px 28px rgba(59, 130, 246, 0.45);
      animation: icon-pulse 3s ease-in-out infinite;
    }
    @keyframes icon-pulse {
      0%, 100% { box-shadow: 0 8px 28px rgba(59, 130, 246, 0.45); }
      50%       { box-shadow: 0 8px 36px rgba(99, 102, 241, 0.65); }
    }
    .card-header h1 {
      font-size: 22px;
      font-weight: 700;
      color: #f1f5f9;
      letter-spacing: -0.3px;
      margin-bottom: 6px;
    }
    .card-header p { font-size: 13.5px; color: #64748b; }

    /* ── Form ── */
    .form-group { margin-bottom: 18px; }
    .form-group label {
      display: block;
      font-size: 11.5px;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 8px;
    }
    .input-wrapper { position: relative; }
    .input-icon {
      position: absolute;
      left: 14px; top: 50%;
      transform: translateY(-50%);
      font-size: 15px;
      pointer-events: none;
      opacity: 0.45;
    }
    .form-group input {
      width: 100%;
      background: rgba(15, 23, 42, 0.65);
      border: 1px solid rgba(255, 255, 255, 0.09);
      border-radius: 13px;
      padding: 13px 14px 13px 44px;
      color: #f1f5f9;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }
    .form-group input::placeholder { color: #475569; }
    .form-group input:focus {
      border-color: #3b82f6;
      background: rgba(15, 23, 42, 0.85);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.18);
    }

    /* ── Button ── */
    #login-btn {
      width: 100%;
      background: linear-gradient(135deg, #3b82f6 0%, #6366f1 100%);
      border: none;
      border-radius: 13px;
      padding: 14px;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      margin-top: 10px;
      letter-spacing: 0.02em;
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 18px rgba(59, 130, 246, 0.38);
    }
    #login-btn:hover:not(:disabled) {
      opacity: 0.91;
      transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(59, 130, 246, 0.55);
    }
    #login-btn:active:not(:disabled) { transform: translateY(0); }
    #login-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Forgot password link ── */
    #forgot-link {
      display: block;
      text-align: right;
      font-size: 12.5px;
      color: #3b82f6;
      margin-top: 8px;
      cursor: pointer;
      text-decoration: none;
      transition: color 0.2s;
    }
    #forgot-link:hover { color: #60a5fa; text-decoration: underline; }

    /* ── Reset password section ── */
    #reset-section {
      display: none;
      margin-top: 18px;
      background: rgba(15, 23, 42, 0.5);
      border: 1px solid rgba(99, 102, 241, 0.25);
      border-radius: 14px;
      padding: 16px;
      animation: card-in 0.3s ease;
    }
    #reset-section p {
      font-size: 12.5px;
      color: #94a3b8;
      margin-bottom: 10px;
      line-height: 1.5;
    }
    #reset-email {
      width: 100%;
      background: rgba(15, 23, 42, 0.65);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 10px;
      padding: 11px 14px;
      color: #f1f5f9;
      font-size: 13.5px;
      font-family: inherit;
      outline: none;
      margin-bottom: 10px;
      transition: border-color 0.2s;
    }
    #reset-email:focus { border-color: #6366f1; }
    #reset-email::placeholder { color: #475569; }
    #reset-btn {
      width: 100%;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border: none;
      border-radius: 10px;
      padding: 11px;
      color: #fff;
      font-size: 13.5px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
    }
    #reset-btn:hover:not(:disabled) { opacity: 0.88; transform: translateY(-1px); }
    #reset-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    #reset-feedback {
      display: none;
      font-size: 12.5px;
      margin-top: 10px;
      text-align: center;
      border-radius: 9px;
      padding: 9px 12px;
    }
    #reset-feedback.success {
      background: rgba(34,197,94,0.1);
      border: 1px solid rgba(34,197,94,0.25);
      color: #86efac;
    }
    #reset-feedback.error {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.25);
      color: #fca5a5;
    }

    /* ── Error message ── */
    #error-msg {
      display: none;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.28);
      border-radius: 11px;
      padding: 11px 15px;
      color: #fca5a5;
      font-size: 13px;
      margin-top: 14px;
      text-align: center;
      animation: shake 0.35s ease;
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25%       { transform: translateX(-6px); }
      75%       { transform: translateX(6px); }
    }

    /* ── Footer note ── */
    .card-footer {
      text-align: center;
      margin-top: 26px;
      padding-top: 20px;
      border-top: 1px solid rgba(255,255,255,0.06);
      font-size: 12.5px;
      color: #475569;
      line-height: 1.7;
    }
    .card-footer strong { color: #64748b; }
    .card-footer a { color: #3b82f6; text-decoration: none; }
    .card-footer a:hover { text-decoration: underline; }

    /* ── Spinner ── */
    .spinner {
      display: inline-block;
      width: 15px; height: 15px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>

<div class="login-card">
  <div class="card-header">
    <div class="bus-icon">🚌</div>
    <h1>College Bus Tracker</h1>
    <p>Sign in to access live GPS tracking</p>
  </div>

  <form id="login-form" autocomplete="on" novalidate>
    <div class="form-group">
      <label for="email">Email Address</label>
      <div class="input-wrapper">
        <span class="input-icon">✉️</span>
        <input type="email" id="email" placeholder="your@email.com" required autocomplete="email"/>
      </div>
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <div class="input-wrapper">
        <span class="input-icon">🔒</span>
        <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password"/>
      </div>
    </div>

    <a id="forgot-link" tabindex="0">Forgot password?</a>

    <button type="submit" id="login-btn">Sign In</button>
    <div id="error-msg"></div>

    <!-- Reset password inline section -->
    <div id="reset-section">
      <p>Enter your email and we'll send you a password reset link.</p>
      <input type="email" id="reset-email" placeholder="your@email.com" autocomplete="email"/>
      <button type="button" id="reset-btn">📧 Send Reset Link</button>
      <div id="reset-feedback"></div>
    </div>
  </form>

  <div class="card-footer">
    <strong>Invite only.</strong> Don't have access?<br>
    Contact admin at <a href="mailto:mohammadzaid7889@gmail.com">mohammadzaid7889@gmail.com</a>
  </div>
</div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyCq-EcP5gLWQlTj4-YMBAGGouD9T0b2Qv0",
    authDomain: "college-bus-tracker-b6e39.firebaseapp.com",
    databaseURL: "https://college-bus-tracker-b6e39-default-rtdb.firebaseio.com",
    projectId: "college-bus-tracker-b6e39",
    storageBucket: "college-bus-tracker-b6e39.firebasestorage.app",
    messagingSenderId: "310600056003",
    appId: "1:310600056003:web:5ee6bd72ce3664f46a7676"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();

  // Already logged in? Go straight to tracker
  auth.onAuthStateChanged(user => {
    if (user) window.location.replace("index.html");
  });

  const form   = document.getElementById("login-form");
  const btn    = document.getElementById("login-btn");
  const errEl  = document.getElementById("error-msg");

  function showError(msg) {
    errEl.textContent = msg;
    errEl.style.display = "block";
    errEl.style.animation = "none";
    void errEl.offsetWidth;
    errEl.style.animation = "";
  }

  // ── Sign In ──
  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    errEl.style.display = "none";

    const email    = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    if (!email || !password) {
      showError("Please fill in all fields.");
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Signing in…';

    try {
      await auth.signInWithEmailAndPassword(email, password);
    } catch (err) {
      btn.disabled = false;
      btn.innerHTML = "Sign In";
      switch (err.code) {
        case "auth/user-not-found":
        case "auth/wrong-password":
        case "auth/invalid-credential":
          showError("❌ Incorrect email or password."); break;
        case "auth/invalid-email":
          showError("❌ Please enter a valid email address."); break;
        case "auth/too-many-requests":
          showError("⚠️ Too many failed attempts. Try again later."); break;
        case "auth/network-request-failed":
          showError("⚠️ Network error. Check your connection."); break;
        default:
          showError("❌ " + err.message);
      }
    }
  });

  // ── Forgot Password ──
  const forgotLink    = document.getElementById("forgot-link");
  const resetSection  = document.getElementById("reset-section");
  const resetBtn      = document.getElementById("reset-btn");
  const resetFeedback = document.getElementById("reset-feedback");

  forgotLink.addEventListener("click", () => {
    const isVisible = resetSection.style.display === "block";
    resetSection.style.display = isVisible ? "none" : "block";
    forgotLink.textContent = isVisible ? "Forgot password?" : "← Back to sign in";
    resetFeedback.style.display = "none";
    // Pre-fill reset email from login email field
    const emailVal = document.getElementById("email").value.trim();
    if (emailVal) document.getElementById("reset-email").value = emailVal;
  });

  resetBtn.addEventListener("click", async () => {
    const email = document.getElementById("reset-email").value.trim();
    resetFeedback.style.display = "none";

    if (!email) {
      resetFeedback.className = "error";
      resetFeedback.textContent = "⚠️ Please enter your email address.";
      resetFeedback.style.display = "block";
      return;
    }

    resetBtn.disabled = true;
    resetBtn.innerHTML = '<span class="spinner"></span>Sending…';

    try {
      await auth.sendPasswordResetEmail(email);
      resetFeedback.className = "success";
      resetFeedback.textContent = "✅ Reset link sent! Check your inbox (and spam folder).";
      resetFeedback.style.display = "block";
      resetBtn.innerHTML = "📧 Send Reset Link";
      resetBtn.disabled = false;
    } catch (err) {
      resetBtn.disabled = false;
      resetBtn.innerHTML = "📧 Send Reset Link";
      resetFeedback.className = "error";
      switch (err.code) {
        case "auth/user-not-found":
          resetFeedback.textContent = "❌ No account found with this email."; break;
        case "auth/invalid-email":
          resetFeedback.textContent = "❌ Please enter a valid email address."; break;
        default:
          resetFeedback.textContent = "❌ " + err.message;
      }
      resetFeedback.style.display = "block";
    }
  });
</script>

</body>
</html>
