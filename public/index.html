<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>College Bus Tracker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      background: #1e293b;
      border-bottom: 1px solid #334155;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      z-index: 10;
    }
    .bus-icon {
      width: 38px; height: 38px;
      background: #3b82f6;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    header h1 { font-size: 18px; font-weight: 600; color: #f1f5f9; }
    header p  { font-size: 12px; color: #94a3b8; }

    /* ── Status bar ── */
    #status-bar {
      background: #1e293b;
      border-bottom: 1px solid #1e3a5f;
      padding: 8px 20px;
      display: flex;
      gap: 24px;
      align-items: center;
      font-size: 13px;
    }
    .stat { display: flex; align-items: center; gap: 6px; color: #94a3b8; }
    .stat span { color: #e2e8f0; font-weight: 500; }
    #dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      background: #64748b;
      transition: background 0.4s;
    }
    #dot.live { background: #22c55e; box-shadow: 0 0 6px #22c55e; }
    #dot.lost { background: #ef4444; }

    /* ── Map ── */
    #map { flex: 1; width: 100%; }

    /* ── Info card (bottom) ── */
    #info-card {
      background: #1e293b;
      border-top: 1px solid #334155;
      padding: 12px 20px;
      display: flex;
      gap: 32px;
      font-size: 13px;
    }
    .info-item { display: flex; flex-direction: column; gap: 2px; }
    .info-label { color: #64748b; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; }
    .info-value { color: #f1f5f9; font-weight: 500; font-size: 14px; }

    /* ── No GPS overlay ── */
    #no-gps {
      display: none;
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 24px 32px;
      text-align: center;
      z-index: 999;
    }
    #no-gps h3 { color: #f59e0b; margin-bottom: 8px; }
    #no-gps p  { color: #94a3b8; font-size: 13px; }
  </style>
</head>
<body>

<header>
  <div class="bus-icon">🚌</div>
  <div>
    <h1>College Bus Tracker</h1>
    <p>Live GPS Tracking System</p>
  </div>
</header>

<div id="status-bar">
  <div class="stat"><div id="dot"></div> <span id="status-text">Connecting...</span></div>
  <div class="stat">Last update: <span id="last-update">—</span></div>
  <div class="stat">Satellites: <span id="satellites">—</span></div>
</div>

<div style="position:relative; flex:1; display:flex; flex-direction:column;">
  <div id="map"></div>
  <div id="no-gps">
    <h3>Waiting for GPS fix</h3>
    <p>ESP32 is connected but GPS has no satellite lock yet.<br>Make sure the NEO-6M has a clear view of the sky.</p>
  </div>
</div>

<div id="info-card">
  <div class="info-item">
    <div class="info-label">Latitude</div>
    <div class="info-value" id="lat-val">—</div>
  </div>
  <div class="info-item">
    <div class="info-label">Longitude</div>
    <div class="info-value" id="lng-val">—</div>
  </div>
  <div class="info-item">
    <div class="info-label">Status</div>
    <div class="info-value" id="gps-status">Waiting...</div>
  </div>
  <div class="info-item">
    <div class="info-label">Updates every</div>
    <div class="info-value">5 seconds</div>
  </div>
</div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<!-- Google Maps -->
<script>
// ── Firebase config ──
const firebaseConfig = {
  apiKey: "AIzaSyCq-EcP5gLWQlTj4-YMBAGGouD9T0b2Qv0",
  authDomain: "college-bus-tracker-b6e39.firebaseapp.com",
  databaseURL: "https://college-bus-tracker-b6e39-default-rtdb.firebaseio.com",
  projectId: "college-bus-tracker-b6e39",
  storageBucket: "college-bus-tracker-b6e39.firebasestorage.app",
  messagingSenderId: "310600056003",
  appId: "1:310600056003:web:5ee6bd72ce3664f46a7676"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let map, marker, infoWindow;
let firstFix = true;

// ── Init Google Map ──
function initMap() {
  // Default center: Lucknow (your city)
  const defaultPos = { lat: 26.8467, lng: 80.9462 };

  map = new google.maps.Map(document.getElementById("map"), {
    zoom: 16,
    center: defaultPos,
    mapTypeId: "roadmap",
    styles: [
      { elementType: "geometry", stylers: [{ color: "#1d2c4d" }] },
      { elementType: "labels.text.fill", stylers: [{ color: "#8ec3b9" }] },
      { elementType: "labels.text.stroke", stylers: [{ color: "#1a3646" }] },
      { featureType: "road", elementType: "geometry", stylers: [{ color: "#304a7d" }] },
      { featureType: "road", elementType: "labels.text.fill", stylers: [{ color: "#98a5be" }] },
      { featureType: "water", elementType: "geometry", stylers: [{ color: "#0e1626" }] },
      { featureType: "poi", stylers: [{ visibility: "off" }] }
    ]
  });

  // Bus marker
  marker = new google.maps.Marker({
    position: defaultPos,
    map: map,
    title: "College Bus",
    icon: {
      url: "data:image/svg+xml;charset=UTF-8," + encodeURIComponent(`
        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
          <circle cx="24" cy="24" r="22" fill="#3b82f6" stroke="white" stroke-width="3"/>
          <text x="24" y="31" font-size="22" text-anchor="middle">🚌</text>
        </svg>
      `),
      scaledSize: new google.maps.Size(48, 48),
      anchor: new google.maps.Point(24, 24)
    }
  });

  infoWindow = new google.maps.InfoWindow({
    content: "<div style='color:#000;font-weight:600'>College Bus</div><div style='color:#555;font-size:12px'>Live tracking active</div>"
  });

  marker.addListener("click", () => infoWindow.open(map, marker));

  // ── Listen to Firebase ──
  listenToFirebase();
}

function listenToFirebase() {
  const locationRef = db.ref("bus/location");

  locationRef.on("value", (snapshot) => {
    const data = snapshot.val();

    if (!data || !data.lat || !data.lng) {
      // ESP32 connected but no GPS fix yet
      document.getElementById("dot").className = "lost";
      document.getElementById("status-text").textContent = "No GPS fix";
      document.getElementById("no-gps").style.display = "block";
      document.getElementById("gps-status").textContent = "No satellite fix";
      return;
    }

    document.getElementById("no-gps").style.display = "none";

    const pos = { lat: data.lat, lng: data.lng };

    // Update marker
    marker.setPosition(pos);

    // Pan to bus on first fix
    if (firstFix) {
      map.setCenter(pos);
      map.setZoom(17);
      firstFix = false;
    }

    // Update UI
    document.getElementById("dot").className = "live";
    document.getElementById("status-text").textContent = "Live";
    document.getElementById("last-update").textContent = new Date().toLocaleTimeString();
    document.getElementById("satellites").textContent = data.satellites || "—";
    document.getElementById("lat-val").textContent = data.lat.toFixed(6);
    document.getElementById("lng-val").textContent = data.lng.toFixed(6);
    document.getElementById("gps-status").textContent = "GPS locked";

  }, (error) => {
    document.getElementById("dot").className = "lost";
    document.getElementById("status-text").textContent = "Connection error";
    console.error("Firebase error:", error);
  });
}
</script>

<!--

</body>
</html>
